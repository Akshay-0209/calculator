<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Notes Manager</h1>
      <div class="search-bar">
        <input type="text" id="search" placeholder="Search notes..." autocomplete="off">
      </div>
    </header>

    <main>
      <section id="notes-list" class="notes-list"></section>
      <section class="editor-section">
        <form id="note-form">
          <h2 id="form-title">Create Note</h2>
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" maxlength="100" required>
          </div>
          <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" maxlength="1000" required></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn primary" id="save-btn">Save</button>
            <button type="button" class="btn" id="cancel-btn" style="display:none;">Cancel</button>
          </div>
          <div id="form-message" class="form-message"></div>
        </form>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
