<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <input type="text" class="calculator-display" id="display" value="0" readonly />
    <div class="calculator-buttons">
      <button data-action="clear">C</button>
      <button data-action="backspace">&#8592;</button>
      <button data-action="divide">÷</button>
      <button data-action="multiply">×</button>
      <button data-number>7</button>
      <button data-number>8</button>
      <button data-number>9</button>
      <button data-action="subtract">-</button>
      <button data-number>4</button>
      <button data-number>5</button>
      <button data-number>6</button>
      <button data-action="add">+</button>
      <button data-number>1</button>
      <button data-number>2</button>
      <button data-number>3</button>
      <button data-action="equals" class="equals">=</button>
      <button data-number>0</button>
      <button data-number>.</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
